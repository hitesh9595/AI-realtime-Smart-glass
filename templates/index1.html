<!DOCTYPE html>
<html>
<head>
    <title>Arduino Distance Monitor</title>
    <style>
        body {
            background: #f2f2f2;
            font-family: Arial;
            text-align: center;
            margin-top: 120px;
        }

        h1 {
            color: #222;
        }

        #value {
            font-size: 70px;
            color: green;
            margin-top: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Ultrasonic Sensor Distance</h1>
    <div id="value">Loading...</div>

    <script>
        function updateDistance() {
            fetch("/distance")
            .then(response => response.json())
            .then(data => {
                document.getElementById("value").innerText = data.distance + " cm";
            });
        }

        setInterval(updateDistance, 1000);
        updateDistance();
    </script>
</body>
</html>
